<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDA IT Helpdesk Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-blue: #003366;
            --bot-bg: #f1f5f9;
            --user-bg: #00509e;
            --text-dark: #1e293b;
            --text-light: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e2e8f0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 80vh;
            overflow: hidden;
        }
        .chat-header {
            background-color: var(--primary-blue);
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            border-bottom: 3px solid #facc15;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.4;
            font-size: 0.95rem;
        }
        .message p { margin: 0 0 8px 0; }
        .message p:last-child { margin: 0; }
        .message ul, .message ol { margin: 5px 0; padding-left: 20px; }
        
        .bot-message {
            background-color: var(--bot-bg);
            color: var(--text-dark);
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }
        .user-message {
            background-color: var(--user-bg);
            color: var(--text-light);
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .escalated-badge {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #f87171;
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
            display: inline-block;
            font-weight: bold;
        }
        .typing-indicator {
            display: none;
            align-self: flex-start;
            color: #64748b;
            font-size: 0.9rem;
            font-style: italic;
            margin: 0 20px 10px 20px;
        }
        
        /* New styles for the image preview area */
        #image-preview-container {
            display: none; 
            padding: 10px 15px; 
            background: #f8fafc; 
            border-top: 1px solid #e2e8f0; 
            text-align: right;
        }
        #image-preview {
            max-height: 50px; 
            border-radius: 4px; 
            border: 1px solid #cbd5e1; 
            vertical-align: middle;
        }
        #remove-image-btn {
            background: none; 
            border: none; 
            color: #ef4444; 
            cursor: pointer; 
            font-weight: bold; 
            margin-left: 10px; 
            vertical-align: middle;
            font-size: 1rem;
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }
        #user-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            font-size: 1rem;
        }
        #user-input:focus {
            border-color: var(--primary-blue);
        }
        #send-btn {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 0 20px;
            margin-left: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        #send-btn:hover {
            background-color: #002244;
        }
        #send-btn:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        MDA IT Support Assistant 🤖
    </div>
    
    <div class="chat-messages" id="chat-messages">
        <div class="message bot-message">
            <p>Hello! I am the MDA IT Helpdesk Assistant. How can I help you today? (e.g., "How do I connect to Wi-Fi?" or "My Teams camera isn't working")</p>
        </div>
    </div>
    
    <div class="typing-indicator" id="typing-indicator">
        Assistant is typing...
    </div>

    <div id="image-preview-container">
        <span style="font-size: 0.8rem; color: #64748b; margin-right: 10px;">📸 Image attached</span>
        <img id="image-preview" src="" alt="Preview">
        <button id="remove-image-btn" title="Remove image">X</button>
    </div>

    <div class="chat-input-area">
        <input type="text" id="user-input" placeholder="Type or paste a screenshot (Ctrl+V)..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const API_URL = 'https://vn1spddkq1.execute-api.us-east-1.amazonaws.com/chat';
    
    const chatMessages = document.getElementById('chat-messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing-indicator');
    
    const imagePreviewContainer = document.getElementById('image-preview-container');
    const imagePreview = document.getElementById('image-preview');
    const removeImageBtn = document.getElementById('remove-image-btn');
    
    let currentImageBase64 = null;

    // Listen for Ctrl+V paste events
    userInput.addEventListener('paste', function(e) {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (let index in items) {
            const item = items[index];
            if (item.kind === 'file' && item.type.includes('image/')) {
                const blob = item.getAsFile();
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentImageBase64 = event.target.result.split(',')[1];
                    imagePreview.src = event.target.result;
                    imagePreviewContainer.style.display = 'block';
                };
                reader.readAsDataURL(blob);
            }
        }
    });

    removeImageBtn.addEventListener('click', () => {
        currentImageBase64 = null;
        imagePreview.src = '';
        imagePreviewContainer.style.display = 'none';
        userInput.focus();
    });

    userInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMessage();
    });

    sendBtn.addEventListener('click', sendMessage);

    async function sendMessage() {
        const query = userInput.value.trim();
        if (!query && !currentImageBase64) return;

        let userDisplayMessage = query;
        if (currentImageBase64) {
            userDisplayMessage += '<br><br><span style="font-size: 0.8rem; background: #e2e8f0; color: #0f172a; padding: 2px 6px; border-radius: 4px;">📸 Image Attached</span>';
        }

        addMessage(userDisplayMessage, 'user');
        userInput.value = '';
        
        const payloadImage = currentImageBase64;
        currentImageBase64 = null;
        imagePreviewContainer.style.display = 'none';
        
        sendBtn.disabled = true;
        typingIndicator.style.display = 'block';
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    query: query,
                    image_base64: payloadImage 
                })
            });

            if (!response.ok) throw new Error('Network response was not ok');

            const data = await response.json();
            addMessage(data.response, 'bot', data.escalated);

        } catch (error) {
            console.error('Error:', error);
            addMessage("Sorry, I'm having trouble connecting. Please try again later.", 'bot');
        } finally {
            sendBtn.disabled = false;
            typingIndicator.style.display = 'none';
            userInput.focus();
        }
    }

    function addMessage(text, sender, isEscalated = false) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message');
        messageDiv.classList.add(sender === 'user' ? 'user-message' : 'bot-message');
        
        let innerContent = '';
        if (isEscalated) innerContent += '<div class="escalated-badge">⚠️ Human Routing Required</div>';
        
        if (sender === 'bot') {
            innerContent += marked.parse(text); 
        } else {
            innerContent += text; 
        }

        messageDiv.innerHTML = innerContent;
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
</script>

</body>
</html>
